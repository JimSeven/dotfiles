#!/usr/bin/env bash
set -euo pipefail

# modify_ target: ~/.codex/config.toml (ADR-0006).
#
# Emits the versioned baseline (durable user settings), then re-appends the
# runtime [projects."…"] trust entries the Codex app writes after the [desktop]
# block. Those stay in the target so project trust survives, but are never
# committed to the repo and no longer drift against the source on every apply.

cat <<'BASELINE'
# Codex managed config (ADR-0006): durable user-authored settings only — plugin
# enablement, feature flags, desktop prefs. Runtime/machine state the Codex app owns
# and regenerates (project trust, marketplaces, MCP wiring incl. its token, NUX
# counters, notify hook) is passed through verbatim below but never committed. A
# chezmoi apply enforces the values above; the app's runtime keys are preserved.

[plugins."github@openai-curated"]
enabled = true

[plugins."sites@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

[features]
js_repl = false

[desktop]
conversationDetailMode = "STEPS_COMMANDS"
ambient-suggestions-enabled = true
followUpQueueMode = "queue"
BASELINE

# Pass through the runtime [projects."…"] trust entries the app appends.
awk 'emit { print } /^followUpQueueMode = "queue"$/ { emit = 1 }'
